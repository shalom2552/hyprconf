# ~/.config/hypr/autostart.conf
##############################
# AUTOSTART
##############################

# Wayland session environment
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Wallpaper
exec-once = awww-daemon
exec-once = bash ~/.config/hypr/scripts/set-wallpaper.sh

# Notifications
exec-once = swaync

# GTK dark mode
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"

# System tray
exec-once = nm-applet

# Walker - run as a service for faster startups
exec-once = walker --gapplication-service
exec-once = elephant # App launcher daemon

# OSD for volume/brightness
exec-once = swayosd-server

# Idle daemon
exec-once = hypridle

# Quickshell popup manager (wallpaper picker)
exec-once = bash ~/.config/hypr/scripts/get_monitor_offset.sh
exec-once = qs -p ~/.config/hypr/scripts/quickshell/Main.qml

