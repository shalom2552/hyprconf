# ~/.config/hypr/hyprlock.conf

# ============================================================================
# DYNAMIC PALETTE (Generated from /tmp/qs_colors.json)
# ============================================================================
source = ~/.config/hypr/hyprlock/colors.conf

# ============================================================================
# GENERAL
# ============================================================================
general {
    no_fade_in           = false
    grace                = 0
    disable_loading_bar  = true
    hide_cursor          = true
    ignore_empty_input   = true
    text_trim            = true
}

# ============================================================================
# BACKGROUND
# ============================================================================
background {
    monitor      =
    path         = screenshot
    color        = $base_alpha85

    blur_passes  = 4
    blur_size    = 5
    noise        = 0.01
    contrast     = 0.9
    brightness   = 0.55
    vibrancy     = 0.17
    vibrancy_darkness = 0.0
}

# ============================================================================
# TIME (Top Section)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:1000] echo "$(date +"%H:%M")"
    color        = $text
    font_size    = 120
    font_family  = JetBrains Mono Nerd Font ExtraBold
    position     = 0, 150
    halign       = center
    valign       = center
}

# ============================================================================
# DATE (Below Time)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color        = $subtext0
    font_size    = 18
    font_family  = JetBrains Mono Nerd Font Bold
    position     = 0, 40
    halign       = center
    valign       = center
}

# ============================================================================
# INPUT FIELD (Pill Shape)
# ============================================================================
input-field {
    monitor      =
    size         = 320, 45
    outline_thickness = 2
    dots_size    = 0.2
    dots_spacing = 0.2
    dots_center  = true
    dots_rounding = -1
    
    # Pill Shape
    rounding     = -1

    # Colors
    outer_color  = $mauve
    inner_color  = $surface0
    font_color   = $text
    
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##cad3f5"><i>password...</i></span>
    hide_input   = false
    
    check_color  = $green
    fail_color   = $red
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $peach
    
    # Lifted up to make room for the bottom dock
    position     = 0, 120
    halign       = center
    valign       = bottom
}

# ============================================================================
# BOTTOM DOCK (The Pill Background)
# ============================================================================
shape {
    monitor      =
    size         = 500, 50  # Wide enough to fit both widgets
    color        = $mantle_alpha60
    rounding     = -1
    border_size  = 1
    border_color = $mauve_alpha30
    rotate       = 0
    xray         = false

    position     = 0, 40
    halign       = center
    valign       = bottom
    zindex       = 1
}

# ============================================================================
# USER WIDGET (Left side of the pill)
# ============================================================================
label {
    monitor      =
    text         =   $USER
    color        = $mauve
    font_size    = 12
    font_family  = JetBrains Mono Nerd Font Bold
    
    # Offset to the LEFT inside the pill
    # We use center alignment, but move X to -200
    position     = -185, 56
    halign       = center
    valign       = bottom
    zindex       = 5
}

# ============================================================================
# BATTERY & LAYOUT (Right side of the pill)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:1000] echo "<span>󰌌  $(~/.config/hypr/hyprlock/scripts/layout.sh)</span>   <span foreground='##6c7086'>|</span>   <span>$(~/.config/hypr/hyprlock/scripts/battery.sh)</span>"
    color        = $subtext0
    font_size    = 12
    font_family  = JetBrains Mono Nerd Font Bold
    
    # Offset to the RIGHT inside the pill
    # We use center alignment, but move X to 160
    position     = 160, 56
    halign       = center
    valign       = bottom
    zindex       = 5
}
