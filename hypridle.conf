# ~/.config/hypr/hypridle.conf

##############################
# IDLE MANAGEMENT
##############################

general {
    lock_cmd         = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd  = hyprctl dispatch "hl.dsp.dpms('on')" ; pkill -x hypridle; sleep 0.5; hypridle &
}

# Lock screen after 5 minutes of inactivity
listener {
    timeout  = 300
    on-timeout = hyprlock
}

# Turn off displays after 10 minutes
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch "hl.dsp.dpms('off')"
    on-resume  = hyprctl dispatch "hl.dsp.dpms('on')"
#     on-timeout = systemctl suspend  # disabling ssh connections
}
